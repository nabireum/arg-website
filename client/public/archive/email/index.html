<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arquivo de E-mails</title>
    <style>
      :root {
        --bg: #0a0a0a;
        --panel: #111315;
        --panel-2: #15181c;
        --line: #262a30;
        --text: #ffffff;
        --muted: #9aa3ad;
        --accent: #2b3f59;
        --accent-soft: #1a2738;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
      }

      .mail-shell {
        display: grid;
        grid-template-columns: 340px 1fr;
        min-height: 100vh;
      }

      .sidebar {
        border-right: 1px solid var(--line);
        background: linear-gradient(180deg, #101214 0%, #0d0f12 100%);
        padding: 16px 12px;
        position: sticky;
        top: 0;
        height: 100vh;
        overflow-y: auto;
      }

      .sidebar h1 {
        margin: 0 8px 14px;
        font-size: 15px;
        letter-spacing: 0.05em;
        color: #d7dde4;
        text-transform: uppercase;
      }

      .mail-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .mail-item {
        background: transparent;
        border: 1px solid transparent;
        border-radius: 8px;
        color: var(--text);
        text-align: left;
        padding: 10px 12px;
        cursor: pointer;
        transition: background 120ms ease, border-color 120ms ease, transform 120ms ease;
      }

      .mail-item:hover {
        background: #151921;
        border-color: #2f3844;
        transform: translateX(1px);
      }

      .mail-item.active {
        background: var(--accent-soft);
        border-color: var(--accent);
        box-shadow: inset 0 0 0 1px rgba(150, 180, 220, 0.18);
      }

      .mail-subject {
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 4px;
        color: #f3f6fa;
      }

      .mail-date {
        font-size: 12px;
        color: var(--muted);
      }

      .viewer {
        padding: 26px 32px;
      }

      .message-card {
        background: linear-gradient(180deg, var(--panel-2) 0%, var(--panel) 100%);
        border: 1px solid var(--line);
        border-radius: 10px;
        min-height: calc(100vh - 52px);
        padding: 22px;
      }

      .meta {
        display: grid;
        gap: 10px;
        margin-bottom: 18px;
      }

      .meta-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        font-size: 14px;
      }

      .meta-label {
        color: #b6c1cd;
        min-width: 64px;
        font-weight: 700;
      }

      .meta-value {
        color: #eff4fa;
      }

      .divider {
        height: 1px;
        width: 100%;
        background: var(--line);
        margin: 18px 0;
      }

      .body {
        white-space: pre-wrap;
        line-height: 1.7;
        font-size: 14px;
        color: #edf2f8;
      }

      @media (max-width: 980px) {
        .mail-shell {
          grid-template-columns: 1fr;
        }

        .sidebar {
          height: auto;
          position: static;
          border-right: none;
          border-bottom: 1px solid var(--line);
        }

        .message-card {
          min-height: 55vh;
        }
      }
    </style>
  </head>
  <body>
    <main class="mail-shell">
      <aside class="sidebar">
        <h1>Caixa de Entrada (Arquivo)</h1>
        <ul id="mailList" class="mail-list"></ul>
      </aside>

      <section class="viewer">
        <article class="message-card">
          <div class="meta">
            <div class="meta-row"><span class="meta-label">From:</span><span class="meta-value" id="from"></span></div>
            <div class="meta-row"><span class="meta-label">To:</span><span class="meta-value" id="to"></span></div>
            <div class="meta-row"><span class="meta-label">Subject:</span><span class="meta-value" id="subject"></span></div>
            <div class="meta-row"><span class="meta-label">Date:</span><span class="meta-value" id="date"></span></div>
          </div>

          <div class="divider"></div>

          <div id="body" class="body"></div>
        </article>
      </section>
    </main>

    <script>
      const emails = [
        {
          id: 'email-1',
          from: 'danicabalian@workspace.com',
          to: 'k.moretti@contato.org',
          subject: 'Próximos passos.',
          date: '20/11/2024 20:33',
          body: `Boa noite, senhor.

Conforme alinhamos, consigo organizar um “panorama” mensal do que está em andamento dentro da Devenementiel. Principalmente frentes de projeto, previsões de custo, contatos-chave e movimentações de fornecedores.

Para manter isso seguro e simples, prefiro tratar a entrega de forma presencial, em encontros curtos e objetivos. Você comentou sobre uma rotina mensal; para mim funciona.
Sugestão: Toda última quinta-feira do mês, 19h20, no mesmo local de ontem.
Levo um resumo inicial e uma cópia dos arquivos no pendrive fornecido.

Atenciosamente,
Danica Ballian.`
        },
        {
          id: 'email-2',
          from: 'danicabalian@workspace.com',
          to: 'k.moretti@contato.org',
          subject: 'Atualização mensal - Dezembro/24.',
          date: '23/12/2024 19:57',
          body: `Boa noite, senhor.
Confirmando que estará tudo pronto para a primeira entrega às 19h20 de quinta-feira. Estamos em época de fechamento e está uma bagunça deliciosa por aqui: gente correndo, planilhas abertas, retrabalho, ninguém prestando atenção em nada além do próprio incêndio.
Consegui reunir uma cópia completa do quadro do mês:
• projetos em andamento e próximos pitches;
• orçamentos (com versões anteriores e cortes aprovados);
• lista de fornecedores e condições praticadas;
• histórico de cliente (ajustes, exigências, pontos fracos);
• um mapa rápido de quem aprova o quê.
Levo tudo em um pendrive, como combinado.

Atenciosamente,
Danica Balian.`
        },
        {
          id: 'email-3',
          from: 'k.moretti@contato.org',
          to: 'danicabalian@workspace.com',
          subject: 'RE: Atualização mensal - Dezembro/24.',
          date: '24/12/2024 10:26',
          body: `Interessante.
Estou ansioso para descobrir se meu investimento vai valer a pena.
Reservei uma mesa para nós, seja discreta.
E, por favor, sem muitas formalidades. Você pode me chamar pelo meu nome, Danica.

Nos vemos em breve.
Kian A. Moretti.`
        },
        {
          id: 'email-4',
          from: 'danicabalian@workspace.com',
          to: 'k.moretti@contato.org',
          subject: 'Atualização mensal - Janeiro/25.',
          date: '20/01/2025 19:09',
          body: `Boa noite, Kian.
Este mês fui mais fundo do que o habitual.
Além do panorama, cruzei as cotações com o que realmente foi aprovado (e com o que “sumiu” na última revisão). Dá para ver onde mudam escopo, valores e prazos (e quem solicita). Além disso, este mês consegui coletar algumas informações sobre clientes e renovações de contratos. Consegui identificar os “gatilhos” de decisão e as fragilidades que costumam pesar na negociação.

Posso te resumir em 20 minutos e te entregar o material.
Podemos agendar esse encontro para amanhã?

Atenciosamente,
Danica Balian.`
        },
        {
          id: 'email-5',
          from: 'k.moretti@contato.org',
          to: 'danicabalian@workspace.com',
          subject: 'RE: Atualização mensal - Janeiro/25.',
          date: '20/01/2025 19:19',
          body: `Podemos agendar essa reunião para amanhã, suas entregas virão em um ótimo momento.
Está fazendo um excelente trabalho, Danica.
Gosto de pessoas esforçadas como você.

Se esse material for tão bom quanto o que me promete, pode esperar por um generoso bônus :).

Aguardo ansiosamente.
Kian A. Moretti.`
        },
        ...Array.from({ length: 12 }, (_, index) => {
          const emailNumber = index + 6;
          return {
            id: `email-${emailNumber}`,
            from: 'archive@segredobalian.space',
            to: 'you@segredobalian.space',
            subject: emailNumber === 6 || emailNumber === 12 ? `RE: Arquivo ${String(emailNumber - 1).padStart(2, '0')}` : `Arquivo ${String(emailNumber).padStart(2, '0')}`,
            date: `00/${String(emailNumber).padStart(2, '0')}/20XX · 23:${String((emailNumber * 3) % 60).padStart(2, '0')}`,
            body: `Este é um espaço reservado para o conteúdo do e-mail ${String(emailNumber).padStart(2, '0')}.

Assim que você enviar os textos finais, este corpo será substituído pela mensagem oficial.`
          };
        })
      ];

      const mailList = document.getElementById('mailList');
      const from = document.getElementById('from');
      const to = document.getElementById('to');
      const subject = document.getElementById('subject');
      const date = document.getElementById('date');
      const body = document.getElementById('body');

      function renderEmail(selectedId) {
        const selected = emails.find((email) => email.id === selectedId) || emails[0];

        from.textContent = selected.from;
        to.textContent = selected.to;
        subject.textContent = selected.subject;
        date.textContent = selected.date;
        body.textContent = selected.body;

        Array.from(mailList.querySelectorAll('.mail-item')).forEach((item) => {
          item.classList.toggle('active', item.dataset.emailId === selected.id);
        });
      }

      function renderList() {
        const fragment = document.createDocumentFragment();

        emails.forEach((email) => {
          const item = document.createElement('button');
          item.type = 'button';
          item.className = 'mail-item';
          item.dataset.emailId = email.id;
          item.innerHTML = `
            <div class="mail-subject">${email.subject}</div>
            <div class="mail-date">${email.date}</div>
          `;

          item.addEventListener('click', () => renderEmail(email.id));
          fragment.appendChild(item);
        });

        mailList.appendChild(fragment);
      }

      renderList();
      renderEmail(emails[0].id);
    </script>
  </body>
</html>
